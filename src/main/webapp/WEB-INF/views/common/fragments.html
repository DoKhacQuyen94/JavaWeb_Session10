<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Hệ thống Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .item-card { transition: transform .2s; }
        .item-card:hover { transform: scale(1.02); }
        .error-msg { color: #dc3545; font-size: 0.875em; margin-top: 0.25rem; }
    </style>
</head>

<body>
    <!-- Navbar cho Sinh viên -->
    <nav th:fragment="student-nav" class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" th:href="@{/student/catalog}"><i class="bi bi-cpu me-2"></i> Web Portal Sinh Viên</a>
            <div class="d-flex">
                <a th:href="@{/login}" class="btn btn-outline-light btn-sm">Admin Login</a>
            </div>
        </div>
    </nav>

    <!-- Sidebar cho Admin -->
    <nav th:fragment="admin-sidebar" class="col-md-2 d-none d-md-block bg-dark sidebar min-vh-100 p-3 text-white">
        <h3 class="text-center mb-4">Lab Admin</h3>
        <ul class="nav flex-column">
            <li class="nav-item mb-2">
                <a class="nav-link text-white" th:classappend="${activePage == 'dashboard' ? 'active bg-primary rounded' : ''}" th:href="@{/admin/dashboard}">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
            </li>
            <li class="nav-item mb-2">
                <a class="nav-link text-white" th:classappend="${activePage == 'items' ? 'active bg-primary rounded' : ''}" th:href="@{/admin/items}">
                    <i class="bi bi-laptop me-2"></i> Quản lý thiết bị
                </a>
            </li>
            <li class="nav-item mb-2">
                <a class="nav-link text-white" th:classappend="${activePage == 'requests' ? 'active bg-primary rounded' : ''}" th:href="@{/admin/requests}">
                    <i class="bi bi-file-earmark-text me-2"></i> Danh sách yêu cầu
                </a>
            </li>
            <li class="nav-item mt-4">
                <a class="nav-link text-danger" th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right me-2"></i> Đăng xuất
                </a>
            </li>
        </ul>
    </nav>

    <!-- Footer scripts -->
    <div th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</body>
</html>
