<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/fragments :: head('Đăng ký mượn')}"></head>
<body class="bg-light">

<div th:replace="~{common/fragments :: student-nav}"></div>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="card shadow border-0 overflow-hidden">
                <div class="card-header bg-success text-white py-3">
                    <h4 class="mb-0 text-center"><i class="bi bi-pencil-square me-2"></i>Phiếu Đăng Ký Mượn</h4>
                </div>
                <div class="card-body p-0">
                    <div class="row g-0">
                        <!-- Cột hiển thị ảnh thiết bị -->
                        <div class="col-md-4 bg-light d-flex align-items-center justify-content-center p-3 border-end">
                            <div th:if="${item.imageUrl}" class="text-center">
                                <img th:src="@{'/uploads/' + ${item.imageUrl}}"
                                     class="img-fluid rounded shadow-sm"
                                     style="max-height: 250px; object-fit: contain;"
                                     alt="item image">
                                <p class="mt-3 mb-0 fw-bold text-success" th:text="${item.name}"></p>
                                <span class="badge bg-info text-dark" th:text="${item.type}"></span>
                            </div>
                            <div th:unless="${item.imageUrl}" class="text-center text-muted py-5">
                                <i class="bi bi-image display-1"></i>
                                <p class="mt-2 fw-bold" th:text="${item.name}"></p>
                            </div>
                        </div>

                        <!-- Cột form nhập liệu -->
                        <div class="col-md-8 p-4">
                            <div class="alert alert-info border-0 shadow-sm mb-4 small">
                                <i class="bi bi-info-circle-fill me-2"></i>
                                Bạn đang đăng ký mượn thiết bị: <strong th:text="${item.name}"></strong>.
                                Vui lòng điền đầy đủ thông tin bên dưới.
                            </div>

                            <form th:action="@{/student/borrow/submit}" th:object="${borrowDTO}" method="post">
                                <input type="hidden" th:field="*{itemId}">

                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Mã sinh viên (MSV)</label>
                                        <input type="text" th:field="*{studentId}" class="form-control" placeholder="VD: SV001">
                                        <div class="error-msg" th:if="${#fields.hasErrors('studentId')}" th:errors="*{studentId}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Họ và tên</label>
                                        <input type="text" th:field="*{studentName}" class="form-control" placeholder="Nhập họ tên đầy đủ">
                                        <div class="error-msg" th:if="${#fields.hasErrors('studentName')}" th:errors="*{studentName}"></div>
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label fw-bold">Email liên hệ</label>
                                        <input type="email" th:field="*{email}" class="form-control" placeholder="example@student.ptit.edu.vn">
                                        <div class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                                    </div>

                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Ngày mượn</label>
                                        <input type="date" th:field="*{startDate}" class="form-control">
                                        <div class="error-msg" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Ngày trả dự kiến</label>
                                        <input type="date" th:field="*{endDate}" class="form-control">
                                        <div class="error-msg" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Số lượng</label>
                                        <input type="number" th:field="*{quantity}" class="form-control" min="1">
                                        <div class="error-msg" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label fw-bold">Lý do mượn</label>
                                        <textarea th:field="*{reason}" class="form-control" rows="3" placeholder="Ghi rõ mục đích sử dụng..."></textarea>
                                        <div class="error-msg" th:if="${#fields.hasErrors('reason')}" th:errors="*{reason}"></div>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-between mt-4 pt-3 border-top">
                                    <a th:href="@{/student/catalog}" class="btn btn-secondary px-4">Hủy bỏ</a>
                                    <button type="submit" class="btn btn-success px-5 fw-bold shadow-sm">
                                        Gửi yêu cầu mượn <i class="bi bi-send-fill ms-2"></i>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{common/fragments :: scripts}"></div>
</body>
</html>
