<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/fragments :: head('Danh sách yêu cầu')}"></head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{common/fragments :: admin-sidebar}"></div>

            <main class="col-md-10 ms-sm-auto px-md-4 py-4">
                <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h2><i class="bi bi-file-earmark-text me-2"></i>REQ-A02: Danh sách yêu cầu</h2>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <table class="table table-striped table-hover mb-0">
                            <thead class="table-dark small text-uppercase fw-bold">
                                <tr>
                                    <th class="ps-4 py-3">Sinh viên</th>
                                    <th class="py-3">Email</th>
                                    <th class="py-3">Thiết bị (SL)</th>
                                    <th class="py-3">Thời gian</th>
                                    <th class="py-3">Lý do</th>
                                    <th class="pe-4 py-3 text-end">Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="req : ${requests}">
                                    <td class="ps-4 py-3">
                                        <div class="fw-bold" th:text="${req.studentId}"></div>
                                        <div class="small text-muted" th:text="${req.studentName}"></div>
                                    </td>
                                    <td class="py-3 small" th:text="${req.email}"></td>
                                    <td class="py-3">
                                        <span class="badge bg-secondary rounded-pill" th:text="${req.quantity}"></span>
                                    </td>
                                    <td class="py-3 small">
                                        <div th:text="${req.startDate}"></div>
                                        <div class="text-muted" th:text="${req.endDate}"></div>
                                    </td>
                                    <td class="py-3 small text-truncate" style="max-width: 200px;" th:text="${req.reason}"></td>
                                    <td class="pe-4 py-3 text-end">
                                        <button class="btn btn-sm btn-success px-3">Duyệt</button>
                                        <button class="btn btn-sm btn-outline-danger border-0"><i class="bi bi-x-lg"></i></button>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(requests)}">
                                    <td colspan="6" class="text-center py-5 text-muted">
                                        <i class="bi bi-inbox display-4 mb-3 d-block"></i>
                                        Chưa có yêu cầu nào được gửi đến.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <div th:replace="~{common/fragments :: scripts}"></div>
</body>
</html>
